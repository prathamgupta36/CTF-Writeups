<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ title }} - Dream of You</title>
    <style>
      :root {
        --ink: #2b2b2b;
        --muted: #7a6e62;
        --accent: #c9897a;
        --accent-dark: #9b5b4b;
        --paper: #fffaf5;
        --panel: #fff2e8;
        --border: #ead9cc;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Georgia", "Times New Roman", serif;
        margin: 0;
        color: var(--ink);
        background: linear-gradient(180deg, #fdf7f1 0%, #f6efe6 100%);
      }
      a { color: var(--accent-dark); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .wrap { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem 3rem; }
      h1 { margin: 0 0 1rem; }
      .panel {
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        box-shadow: 0 3px 10px rgba(107, 70, 53, 0.08);
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 1rem;
      }
      label { color: var(--muted); font-size: 0.95rem; }
      input {
        font: inherit;
        padding: 0.45rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #fff;
      }
      button {
        font: inherit;
        background: #fff;
        border: 1px solid var(--border);
        padding: 0.45rem 0.8rem;
        border-radius: 6px;
      }
      .story {
        line-height: 1.75;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>{{ title }}</h1>
      <div class="panel">
        <form method="get" class="controls">
          <label>Your name:</label>
          <input name="name" value="{{ name }}" maxlength="64" />
          <button type="submit">Update</button>
          <a href="/">Back</a>
        </form>
        <div class="story">{{ story|safe }}</div>
      </div>
    </div>
  </body>
</html>
