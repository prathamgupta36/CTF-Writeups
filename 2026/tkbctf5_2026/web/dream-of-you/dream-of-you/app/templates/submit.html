<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Write - Dream of You</title>
    <style>
      :root {
        --ink: #2b2b2b;
        --muted: #7a6e62;
        --accent: #c9897a;
        --accent-dark: #9b5b4b;
        --paper: #fffaf5;
        --panel: #fff2e8;
        --border: #ead9cc;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Georgia", "Times New Roman", serif;
        margin: 0;
        color: var(--ink);
        background: linear-gradient(180deg, #fdf7f1 0%, #f6efe6 100%);
      }
      a { color: var(--accent-dark); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .wrap { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem 3rem; }
      h1 { margin: 0 0 1rem; }
      .panel {
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        box-shadow: 0 3px 10px rgba(107, 70, 53, 0.08);
      }
      .field { margin-bottom: 1rem; }
      label { display: block; font-size: 0.95rem; color: var(--muted); margin-bottom: 0.35rem; }
      input, textarea {
        width: 100%;
        font: inherit;
        padding: 0.6rem 0.75rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
      }
      textarea { min-height: 14rem; resize: vertical; }
      .hint { color: var(--muted); font-size: 0.9rem; margin-top: 0.35rem; }
      .actions { display: flex; gap: 0.75rem; align-items: center; }
      button {
        font: inherit;
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 0.6rem 1rem;
        border-radius: 8px;
      }
      button:hover { background: var(--accent-dark); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Write a dream novel</h1>
      <div class="panel">
        <form method="post">
          <div class="field">
            <label>Title</label>
            <input name="title" maxlength="64" required />
          </div>
          <div class="field">
            <label>Default name</label>
            <input name="default_name" maxlength="64" required />
          </div>
          <div class="field">
            <label>Story. "[name]" will be replaced with reader's name. URLs are auto-linked.</label>
            <textarea name="content" rows="12" cols="70" maxlength="4000" required></textarea>
          </div>
          <div class="actions">
            <button type="submit">Publish</button>
            <a href="/">Back</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
